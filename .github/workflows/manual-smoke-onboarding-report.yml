name: manual-smoke-onboarding-report

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-smoke-onboarding-report
  cancel-in-progress: false

jobs:
  smoke-onboarding-report:
    name: Manual smoke — onboarding + direct report
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run onboarding -> report smoke
        run: npx playwright test tests/smoke/onboarding-to-report.spec.ts --project=chromium --workers=1

      - name: Run direct report smoke
        run: npx playwright test tests/smoke/report-direct.spec.ts --project=chromium --workers=1

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-onboarding-report-html
          path: playwright-report
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-onboarding-report-results
          path: test-results
          retention-days: 14
