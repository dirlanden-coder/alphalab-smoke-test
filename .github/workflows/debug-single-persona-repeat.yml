name: debug-single-persona-repeat

on:
  workflow_dispatch:
    inputs:
      persona_code:
        description: Persona code, e.g. GR-MARIA-22-ATH
        required: true
        type: string
        default: GR-MARIA-22-ATH
      browser:
        description: Browser to use
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      repeat_count:
        description: How many times to repeat the same flow
        required: true
        default: "5"
        type: string

permissions:
  contents: read

concurrency:
  group: debug-single-persona-repeat-${{ inputs.persona_code }}-${{ inputs.browser }}
  cancel-in-progress: false

jobs:
  debug-single-persona:
    name: Debug ${{ inputs.persona_code }} x${{ inputs.repeat_count }} on ${{ inputs.browser }}
    runs-on: ubuntu-latest
    env:
      CI: true
      PERSONA_CODE: ${{ inputs.persona_code }}
      REPEAT_COUNT: ${{ inputs.repeat_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ inputs.browser }}

      - name: Generate debug repeat spec
        shell: bash
        run: |
          mkdir -p tests/generated
          cat > tests/generated/debug-single-persona-repeat.generated.spec.ts <<'EOF'
          import { test, expect } from '@playwright/test';
          import { REPORT_URL } from '../config/targets';
          import { openOnboarding, fillAndContinue } from '../helpers/onboarding';
          import { waitForStableReport, verifyCriticalNodes, captureSignature } from '../helpers/reportSignature';

          const personaCode = process.env.PERSONA_CODE || 'GR-MARIA-22-ATH';
          const repeatCount = Number(process.env.REPEAT_COUNT || '5');
          const expectedReportFile = REPORT_URL.split('/').pop() || 'AlphaLab';

          for (let i = 1; i <= repeatCount; i++) {
            test(`debug-repeat :: ${personaCode} :: run ${i}`, async ({ page }, testInfo) => {
              const pageErrors: string[] = [];

              page.on('pageerror', err => pageErrors.push(String(err)));
              page.on('console', msg => {
                if (msg.type() === 'error') pageErrors.push(msg.text());
              });

              await openOnboarding(page);
              await fillAndContinue(page, personaCode);

              await waitForStableReport(page, 15000, 500);
              await verifyCriticalNodes(page);
              expect(page.url()).toContain(expectedReportFile);

              const sig1 = await captureSignature(page);
              expect(sig1).toBeTruthy();

              const storageDump = await page.evaluate(() => ({
                url: location.href,
                alphalab_profile: localStorage.getItem('alphalab_profile'),
                alphalab_answers: localStorage.getItem('alphalab_answers'),
                al_profile: localStorage.getItem('al.profile'),
                al_answers: localStorage.getItem('al.answers')
              }));

              await testInfo.attach('signature-before-reload.txt', {
                body: Buffer.from(sig1, 'utf-8'),
                contentType: 'text/plain'
              });

              await testInfo.attach('storage-before-reload.json', {
                body: Buffer.from(JSON.stringify(storageDump, null, 2), 'utf-8'),
                contentType: 'application/json'
              });

              await page.reload({ waitUntil: 'domcontentloaded' });
              await waitForStableReport(page, 15000, 500);
              await verifyCriticalNodes(page);

              const sig2 = await captureSignature(page);
              expect(sig2).toBeTruthy();
              expect(sig2).toBe(sig1);

              await testInfo.attach('signature-after-reload.txt', {
                body: Buffer.from(sig2, 'utf-8'),
                contentType: 'text/plain'
              });

              expect(pageErrors, `Console/page errors for ${personaCode} run ${i}`).toEqual([]);
            });
          }
          EOF

      - name: Run repeated debug flow
        run: npx playwright test tests/generated/debug-single-persona-repeat.generated.spec.ts --project=${{ inputs.browser }} --workers=1

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-single-persona-html-${{ inputs.persona_code }}-${{ inputs.browser }}
          path: playwright-report
          retention-days: 21

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-single-persona-results-${{ inputs.persona_code }}-${{ inputs.browser }}
          path: test-results
          retention-days: 21
